[package]
name = "python-buildpack"
version = "0.0.0"
publish = false
edition = "2021"
rust-version = "1.62"

[dependencies]
# Using an alternate backend due to:
# https://github.com/rust-lang/flate2-rs/issues/297
# Not able to use the fastest `zlib-ng-compat` backend due to:
# https://github.com/rust-lang/libz-sys/issues/93
flate2 = { version = "1.0.24", default-features = false, features = ["zlib"] }
indoc = "1.0.6"
libcnb = "0.9.0"
libherokubuildpack = "0.9.0"
serde = "1.0.140"
tar = "0.4.38"
ureq = { version = "2.5.0", default-features = false, features = ["tls"] }

[dev-dependencies]
libcnb-test = "0.6.0"
