# Note: This was a WIP to test performance of Circle CI vs GitHub Actions.
# Was only tested with the procfile-cnb so may need changes to work with
# this repo + general cleanup.

name: CI

on: push

env:
  CARGO_PROFILE_DEV_STRIP: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Update Rust toolchain
        run: rustup update
      - name: Rust Cache
        uses: Swatinem/rust-cache@v1.4.0
      - name: Clippy
        # Using --all-targets so tests are checked and --deny to fail on warnings.
        run: cargo clippy --all-targets --all-features --locked -- --deny warnings
      - name: rustfmt
        run: cargo fmt -- --check --verbose

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Update Rust toolchain
        run: rustup update
      - name: Rust Cache
        uses: Swatinem/rust-cache@v1.4.0
      - name: Run tests
        run: cargo test --all-features --locked

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install musl-tools
        run: sudo apt-get install musl-tools --no-install-recommends
      - name: Update Rust toolchain
        run: rustup update
      - name: Install Rust linux-musl target
        run: rustup target add x86_64-unknown-linux-musl
      - name: Rust Cache
        uses: Swatinem/rust-cache@v1.4.0
      - name: Install Pack CLI
        uses: buildpacks/github-actions/setup-pack@v4.6.0
      - name: Run integration tests
        # Runs any tests annotated with the `#[ignore]` attribute (which in this repo, are all of the integration tests).
        run: cargo test --all-features --locked -- --ignored
